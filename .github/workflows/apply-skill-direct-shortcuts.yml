name: Apply skill direct shortcuts

on:
  push:
    branches: [feature/skill-direct-shortcuts]
    paths:
      - tools/skill-direct-shortcuts.trigger

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/skill-direct-shortcuts

      - name: Integrate shortcut UI and runtime
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          def regex_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{label}: expected one regex match, found {count}')
              return updated

          # package.json
          package_path = Path('package.json')
          package = package_path.read_text(encoding='utf-8')
          package = replace_once(
              package,
              '    "test:ui-bugfix": "node --test ui_bugfix_tests.cjs",\n',
              '    "test:ui-bugfix": "node --test ui_bugfix_tests.cjs",\n    "test:skill-shortcuts": "node --test skill_shortcut_tests.cjs",\n',
              'package shortcut test script',
          )
          package_path.write_text(package, encoding='utf-8')

          # preload bridge
          preload_path = Path('electron/preload.cjs')
          preload = preload_path.read_text(encoding='utf-8')
          preload = replace_once(
              preload,
              "  deleteSkill: (skillId) => ipcRenderer.invoke('skills:delete', skillId),\n",
              "  deleteSkill: (skillId) => ipcRenderer.invoke('skills:delete', skillId),\n  validateSkillShortcut: (skillId, shortcut) => ipcRenderer.invoke('skills:shortcut:validate', { skillId, shortcut }),\n  setSkillShortcut: (skillId, shortcut) => ipcRenderer.invoke('skills:shortcut:set', { skillId, shortcut }),\n  clearSkillShortcut: (skillId) => ipcRenderer.invoke('skills:shortcut:clear', { skillId }),\n",
              'preload shortcut APIs',
          )
          preload_path.write_text(preload, encoding='utf-8')

          # App.tsx
          app_path = Path('src/App.tsx')
          app = app_path.read_text(encoding='utf-8')
          app = replace_once(
              app,
              "import { SkillIcon, SKILL_ICON_KEYS } from './components/SkillIcon'\n",
              "import { SkillIcon, SKILL_ICON_KEYS } from './components/SkillIcon'\nimport { SkillShortcutDialog } from './components/SkillShortcutDialog'\nimport { formatSkillShortcut, type SkillShortcut } from './shortcuts/skillShortcut'\n",
              'app shortcut imports',
          )
          app = replace_once(
              app,
              "  iconKey?: string\n}\n",
              "  iconKey?: string\n  shortcut?: SkillShortcut | null\n}\n",
              'skill shortcut data field',
          )
          app = replace_once(
              app,
              "      deleteSkill: (skillId: string) => Promise<InitialData>\n",
              "      deleteSkill: (skillId: string) => Promise<InitialData>\n      validateSkillShortcut: (skillId: string, shortcut: SkillShortcut) => Promise<{ ok: boolean; error?: string; shortcut?: SkillShortcut }>\n      setSkillShortcut: (skillId: string, shortcut: SkillShortcut) => Promise<{ ok: boolean; error?: string; shortcut?: SkillShortcut }>\n      clearSkillShortcut: (skillId: string) => Promise<{ ok: boolean; error?: string }>\n",
              'desktop API shortcut types',
          )
          app = replace_once(
              app,
              "  const refreshConversations = async () => {\n",
              "  const refreshData = async () => {\n    const next = await window.desktopApi.getInitialData()\n    setData(next)\n  }\n  const refreshConversations = async () => {\n",
              'main refresh data helper',
          )
          app = replace_once(
              app,
              "          {tab === 'skills' && <SkillsPanel skills={data.skills} onSave={saveSkill} onDelete={deleteSkill} onReorder={reorderSkills} />}\n",
              "          {tab === 'skills' && <SkillsPanel skills={data.skills} onSave={saveSkill} onDelete={deleteSkill} onReorder={reorderSkills} onRefresh={refreshData} />}\n",
              'skills panel refresh prop',
          )
          app = replace_once(
              app,
              "function SkillsPanel({ skills, onSave, onDelete, onReorder }: { skills: Skill[]; onSave: (skill: Skill) => void; onDelete: (skillId: string) => void; onReorder: (skillIds: string[]) => void }) {\n",
              "function SkillsPanel({ skills, onSave, onDelete, onReorder, onRefresh }: { skills: Skill[]; onSave: (skill: Skill) => void; onDelete: (skillId: string) => void; onReorder: (skillIds: string[]) => void; onRefresh: () => void | Promise<void> }) {\n",
              'skills panel signature',
          )
          app = replace_once(
              app,
              "  const [editing, setEditing] = useState<Skill | null>(null)\n",
              "  const [editing, setEditing] = useState<Skill | null>(null)\n  const [shortcutSkill, setShortcutSkill] = useState<Skill | null>(null)\n",
