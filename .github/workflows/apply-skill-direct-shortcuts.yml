const activeSkillKeyboardShortcuts = new Map();
let skillShortcutSessionActive = false;
let skillShortcutTriggerLockUntil = 0;

function sendSelectionHelperCommand(command) {
  if (!selectionHelperProcess || !selectionHelperProcess.stdin || selectionHelperProcess.stdin.destroyed) return false;
  try {
    selectionHelperProcess.stdin.write(`${command}\n`);
    return true;
  } catch (error) {
    console.warn('[SkillShortcut] helper command failed', error instanceof Error ? error.message : String(error));
    return false;
  }
}

function deactivateSkillShortcuts(reason = 'unknown') {
  for (const accelerator of activeSkillKeyboardShortcuts.keys()) {
    try { globalShortcut.unregister(accelerator); } catch (_) {}
  }
  activeSkillKeyboardShortcuts.clear();
  skillShortcutSessionActive = false;
  sendSelectionHelperCommand('SHORTCUT_SESSION|OFF');
  console.log('[SkillShortcut] deactivated reason=' + reason);
}

function activateSkillShortcutsForToolbar() {
  deactivateSkillShortcuts('refresh');
  if (overlayState !== 'toolbar_visible') return;
  const store = readStore();
  const enabledSkills = (store.skills || []).filter((skill) => skill && skill.enabled !== false && skill.shortcut);
  let mouseShortcutCount = 0;

  for (const skill of enabledSkills) {
    let shortcut;
    try { shortcut = skillShortcutUtils.normalizeShortcut(skill.shortcut); } catch (error) {
      console.warn('[SkillShortcut] invalid binding skillId=' + skill.id, error instanceof Error ? error.message : String(error));
      continue;
    }
    if (!shortcut) continue;
    if (shortcut.kind === 'mouse') {
      mouseShortcutCount += 1;
      continue;
    }
    const ok = globalShortcut.register(shortcut.value, () => {
      void triggerSkillShortcut(skill.id, shortcut.value);
    });
    if (ok) {
      activeSkillKeyboardShortcuts.set(shortcut.value, skill.id);
    } else {
      console.warn('[SkillShortcut] registration failed binding=' + shortcut.value + ' skillId=' + skill.id);
    }
  }

  if (mouseShortcutCount > 0) {
    sendSelectionHelperCommand('SHORTCUT_SESSION|' + skillShortcutUtils.encodeMouseBindings(enabledSkills));
  }
  skillShortcutSessionActive = activeSkillKeyboardShortcuts.size > 0 || mouseShortcutCount > 0;
  console.log('[SkillShortcut] activated keyboard=' + activeSkillKeyboardShortcuts.size + ' mouse=' + mouseShortcutCount);
}

async function triggerSkillShortcut(skillId, binding) {
  const now = Date.now();
  if (!skillShortcutSessionActive || overlayState !== 'toolbar_visible' || now < skillShortcutTriggerLockUntil) return;
  const selectedText = currentPickedInfo?.text || currentSelection;
  if (!selectedText) return;
  skillShortcutTriggerLockUntil = now + 350;
  deactivateSkillShortcuts('trigger:' + binding);
  try {
    await executeSkillById(skillId, selectedText, { source: 'skill-shortcut', binding });
  } catch (error) {
    console.error('[SkillShortcut] execution failed skillId=' + skillId, error);
  }
}

function canRegisterSkillKeyboardShortcut(shortcut) {
  if (!shortcut || shortcut.kind !== 'keyboard') return { ok: true };
  if (globalShortcut.isRegistered(shortcut.value)) {
    return { ok: false, error: '该快捷键已被当前应用占用。' };
  }
  let ok = false;
  try {
    ok = globalShortcut.register(shortcut.value, () => {});
  } catch (_) {
    ok = false;
  }
  if (ok) {
    try { globalShortcut.unregister(shortcut.value); } catch (_) {}
    return { ok: true };
  }
  return { ok: false, error: '该快捷键已被系统或其他程序占用。' };
}

function validateShortcutForStore(skillId, input, store = readStore(), checkSystem = true) {
  const validation = skillShortcutUtils.validateSkillShortcut(input, {
    skillId,
    skills: store.skills || [],
    selectionHotkey: readHotkeyConfig().selectionHotkey,
  });
  if (!validation.ok || !validation.shortcut) return validation;
  if (checkSystem && validation.shortcut.kind === 'keyboard') {
    const availability = canRegisterSkillKeyboardShortcut(validation.shortcut);
    if (!availability.ok) return availability;
  }
  return validation;
}
'''
