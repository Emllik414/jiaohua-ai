          helper_function = r'''function startSelectionHelper() {
  if (selectionHelperProcess) return;
  const script = `
Add-Type -TypeDefinition @"
using System;
using System.Collections.Generic;
using System.Diagnostics;
using System.Runtime.InteropServices;
using System.Text;
using System.Threading;
using System.Windows.Forms;

public class MouseHookRunner {
  private const int WH_MOUSE_LL = 14;
  private const int WM_LBUTTONDOWN = 0x0201;
  private const int WM_LBUTTONUP = 0x0202;
  private const int WM_RBUTTONDOWN = 0x0204;
  private const int WM_MBUTTONDOWN = 0x0207;
  private const int WM_MOUSEWHEEL = 0x020A;
  private const int WM_XBUTTONDOWN = 0x020B;
  private const int VK_SHIFT = 0x10;
  private const int VK_CONTROL = 0x11;
  private const int VK_MENU = 0x12;
  private const int VK_LWIN = 0x5B;
  private const int VK_RWIN = 0x5C;
  private const byte VK_C = 0x43;
  private const uint KEYEVENTF_KEYUP = 0x0002;
  private static IntPtr hookId = IntPtr.Zero;
  private static LowLevelMouseProc proc = HookCallback;
  private static int downX = 0;
  private static int downY = 0;
  private static long downAt = 0;
  private static long lastCaptureAt = 0;
  private static int minDistance = 12;
  private static readonly object shortcutLock = new object();
  private static readonly Dictionary<string, string> shortcutBindings = new Dictionary<string, string>(StringComparer.OrdinalIgnoreCase);
  private static bool shortcutSessionActive = false;

  public static void Run() {
    Thread inputThread = new Thread(ReadCommands);
    inputThread.IsBackground = true;
    inputThread.Start();
    hookId = SetHook(proc);
    Application.Run();
    UnhookWindowsHookEx(hookId);
  }

  private static void ReadCommands() {
    try {
      string line;
      while ((line = Console.ReadLine()) != null) {
        if (line == "SHORTCUT_SESSION|OFF") {
          lock (shortcutLock) {
            shortcutSessionActive = false;
            shortcutBindings.Clear();
          }
          continue;
        }
        if (!line.StartsWith("SHORTCUT_SESSION|")) continue;
        string payload = line.Substring("SHORTCUT_SESSION|".Length);
        string decoded = Encoding.UTF8.GetString(Convert.FromBase64String(payload));
        Dictionary<string, string> next = new Dictionary<string, string>(StringComparer.OrdinalIgnoreCase);
        foreach (string row in decoded.Split(new[] { '\n' }, StringSplitOptions.RemoveEmptyEntries)) {
          string[] parts = row.Split(new[] { '\t' }, 2);
          if (parts.Length == 2 && parts[0].Length > 0 && parts[1].Length > 0) next[parts[0]] = parts[1];
        }
        lock (shortcutLock) {
          shortcutBindings.Clear();
          foreach (KeyValuePair<string, string> entry in next) shortcutBindings[entry.Key] = entry.Value;
          shortcutSessionActive = shortcutBindings.Count > 0;
        }
      }
    } catch {}
  }

  private static bool IsPressed(int virtualKey) {
    return (GetAsyncKeyState(virtualKey) & 0x8000) != 0;
  }

  private static string ModifierPrefix() {
    StringBuilder builder = new StringBuilder();
    if (IsPressed(VK_CONTROL)) builder.Append("Ctrl+");
    if (IsPressed(VK_MENU)) builder.Append("Alt+");
    if (IsPressed(VK_SHIFT)) builder.Append("Shift+");
    if (IsPressed(VK_LWIN) || IsPressed(VK_RWIN)) builder.Append("Meta+");
    return builder.ToString();
  }

  private static bool TryTriggerShortcut(int message, MSLLHOOKSTRUCT hookStruct) {
    string token = "";
    if (message == WM_MBUTTONDOWN) {
      token = "MouseMiddle";
    } else if (message == WM_XBUTTONDOWN) {
      int xButton = (int)((hookStruct.mouseData >> 16) & 0xffff);
      token = xButton == 1 ? "MouseX1" : xButton == 2 ? "MouseX2" : "";
    } else if (message == WM_MOUSEWHEEL) {
      short delta = unchecked((short)((hookStruct.mouseData >> 16) & 0xffff));
      token = delta > 0 ? "WheelUp" : "WheelDown";
    }
    if (token.Length == 0) return false;

    string binding = ModifierPrefix() + token;
    string skillId = "";
    lock (shortcutLock) {
      if (!shortcutSessionActive || !shortcutBindings.TryGetValue(binding, out skillId)) return false;
      shortcutSessionActive = false;
      shortcutBindings.Clear();
    }
    string encodedSkill = Convert.ToBase64String(Encoding.UTF8.GetBytes(skillId));
    string encodedBinding = Convert.ToBase64String(Encoding.UTF8.GetBytes(binding));
    Console.WriteLine("SKILL_SHORTCUT|" + encodedSkill + "|" + encodedBinding);
    Console.Out.Flush();
    return true;
  }

  private static IntPtr SetHook(LowLevelMouseProc proc) {
    using (Process curProcess = Process.GetCurrentProcess())
    using (ProcessModule curModule = curProcess.MainModule) {
      return SetWindowsHookEx(WH_MOUSE_LL, proc, GetModuleHandle(curModule.ModuleName), 0);
    }
  }

  private delegate IntPtr LowLevelMouseProc(int nCode, IntPtr wParam, IntPtr lParam);

  private static IntPtr HookCallback(int nCode, IntPtr wParam, IntPtr lParam) {
    if (nCode >= 0) {
      MSLLHOOKSTRUCT hookStruct = (MSLLHOOKSTRUCT)Marshal.PtrToStructure(lParam, typeof(MSLLHOOKSTRUCT));
      int message = wParam.ToInt32();
      if (TryTriggerShortcut(message, hookStruct)) return (IntPtr)1;
      if (message == WM_LBUTTONDOWN) {
        downX = hookStruct.pt.x;
        downY = hookStruct.pt.y;
        downAt = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds();
        Console.WriteLine("CLICK|" + hookStruct.pt.x + "|" + hookStruct.pt.y);
        Console.Out.Flush();
      } else if (message == WM_LBUTTONUP) {
        long now = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds();
        int dx = hookStruct.pt.x - downX;
        int dy = hookStruct.pt.y - downY;
        double distance = Math.Sqrt(dx * dx + dy * dy);
        long duration = now - downAt;
        if (distance >= minDistance && duration >= 80 && now - lastCaptureAt > 250) {
          lastCaptureAt = now;
          BeginCapture(downX, downY, hookStruct.pt.x, hookStruct.pt.y);
        }
      } else if (message == WM_RBUTTONDOWN || message == WM_MBUTTONDOWN) {
        Console.WriteLine("CLICK|" + hookStruct.pt.x + "|" + hookStruct.pt.y);
        Console.Out.Flush();
      }
    }
    return CallNextHookEx(hookId, nCode, wParam, lParam);
  }

  private static void BeginCapture(int startX, int startY, int endX, int endY) {
    Thread captureThread = new Thread(() => {
      try {
        Thread.Sleep(35);
        string processName = "";
        string windowTitle = "";
        try {
          IntPtr hwnd = GetForegroundWindow();
          StringBuilder title = new StringBuilder(512);
          GetWindowText(hwnd, title, title.Capacity);
          windowTitle = title.ToString();
          uint pid;
          GetWindowThreadProcessId(hwnd, out pid);
          if (pid > 0) processName = Process.GetProcessById((int)pid).ProcessName;
        } catch {}
        string encodedProcess = Convert.ToBase64String(Encoding.UTF8.GetBytes(processName));
        string encodedTitle = Convert.ToBase64String(Encoding.UTF8.GetBytes(windowTitle));
        Console.WriteLine("SELECTED||" + startX + "|" + startY + "|" + endX + "|" + endY + "|" + encodedProcess + "|" + encodedTitle);
        Console.Out.Flush();
      } catch (Exception ex) {
        string encoded = Convert.ToBase64String(Encoding.UTF8.GetBytes(ex.Message));
        Console.WriteLine("ERROR|" + encoded);
        Console.Out.Flush();
      }
    });
    captureThread.SetApartmentState(ApartmentState.STA);
    captureThread.IsBackground = true;
    captureThread.Start();
  }

  private static void SendCtrlC() {
    keybd_event(VK_CONTROL, 0, 0, UIntPtr.Zero);
    keybd_event(VK_C, 0, 0, UIntPtr.Zero);
    keybd_event(VK_C, 0, KEYEVENTF_KEYUP, UIntPtr.Zero);
    keybd_event(VK_CONTROL, 0, KEYEVENTF_KEYUP, UIntPtr.Zero);
  }

  [StructLayout(LayoutKind.Sequential)]
  private struct POINT { public int x; public int y; }

  [StructLayout(LayoutKind.Sequential)]
  private struct MSLLHOOKSTRUCT {
    public POINT pt;
    public uint mouseData;
    public uint flags;
    public uint time;
    public IntPtr dwExtraInfo;
  }

