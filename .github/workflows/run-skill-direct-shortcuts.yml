name: Run skill direct shortcuts integration

on:
  push:
    branches:
      - feature/skill-direct-shortcuts
    paths:
      - tools/run-skill-direct-shortcuts.trigger

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/skill-direct-shortcuts

      - name: Extract patch program
        shell: bash
        run: |
          python3 - <<'EXTRACT'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-skill-direct-shortcuts.yml').read_text(encoding='utf-8')
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          lines = workflow[start:end].splitlines()
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'
          Path('/tmp/apply-skill-direct-shortcuts.py').write_text(script, encoding='utf-8')
          EXTRACT

      - name: Apply integration patch
        run: python3 /tmp/apply-skill-direct-shortcuts.py

      - name: Validate JavaScript syntax
        run: |
          node --check electron/main.cjs
          node --check electron/preload.cjs
          node --check electron/skill-shortcut-utils.cjs

      - name: Run shortcut tests
        run: node --test skill_shortcut_tests.cjs

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build application
        run: npm run build

      - name: Run existing UI regression tests
        run: npm run test:ui-bugfix

      - name: Commit validated feature
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-skill-direct-shortcuts.yml
          git rm .github/workflows/run-skill-direct-shortcuts.yml
          git rm tools/skill-direct-shortcuts.trigger
          git rm tools/run-skill-direct-shortcuts.trigger
          git add package.json electron/main.cjs electron/preload.cjs src/App.tsx src/App.css
          git commit -m "add scoped skill keyboard and mouse shortcuts"
          git push origin feature/skill-direct-shortcuts
