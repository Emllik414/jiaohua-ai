name: Publish Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v0.1.0-beta.1
      release_name:
        description: Release title
        required: true
        default: 饺滑-AI划词助手 v0.1.0 Beta
      run_id:
        description: Windows build workflow run ID
        required: true
        default: "29171547963"
      prerelease:
        description: Mark as prerelease
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}
          path: release-assets

      - name: Show downloaded files
        run: find release-assets -maxdepth 3 -type f -print

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p prepared-assets
          find release-assets -type f \( \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name 'SHA256SUMS.txt' -o \
            -name '*.zip' \
          \) -exec cp '{}' prepared-assets/ \;
          test -n "$(find prepared-assets -maxdepth 1 -type f -print -quit)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        shell: bash
        run: |
          prerelease_flag=""
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          cat > release-notes.md <<'EOF'
          ## 饺滑-AI划词助手 v0.1.0 Beta

          首个公开测试版本。

          ### 主要功能
          - 网页与文档划词调用 AI
          - 自动保存每一次划词与历史对话
          - 自定义技能、系统提示词和划词提示词
          - 自由配置和切换不同 API 服务商
          - 支持导入 Obsidian 和本地文件
          - 支持导出 TXT、Markdown、Word 等格式
          - 结果卡片可一键导入 Obsidian
          - 修复 Microsoft Edge 浏览器插件兼容与后台恢复问题

          ### 安装说明
          1. 下载并运行 Windows 安装程序。
          2. 启动“饺滑-AI划词助手”。
          3. 在 Edge 中打开 `edge://extensions`，开启“开发人员模式”。
          4. 点击“加载解压缩的扩展”，选择软件安装目录下的 `resources/browser-extension` 文件夹。
          5. 刷新普通网页后，划选文字测试。

          ### 注意事项
          - 当前版本为 Beta 测试版。
          - Windows 可能提示“未知发布者”，这是因为安装包尚未进行代码签名。
          - `edge://`、浏览器扩展商店等受保护页面无法使用划词插件，这是浏览器限制。
          - 请自行配置 API Key，不要分享或提交真实密钥。
          EOF

          gh release create "$TAG" prepared-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "2e8f2187bb2519020773298e0b138c821008a3ba" \
            --title "$RELEASE_NAME" \
            --notes-file release-notes.md \
            $prerelease_flag
