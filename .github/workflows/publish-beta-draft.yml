name: Publish Beta Draft Release

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/publish-beta-draft.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  publish-draft:
    runs-on: ubuntu-latest
    env:
      TAG: v0.1.0-beta.1
      RELEASE_NAME: 饺滑-AI划词助手 v0.1.0 Beta
      BUILD_RUN_ID: "29171547963"
      TARGET_COMMIT: 2e8f2187bb2519020773298e0b138c821008a3ba

    steps:
      - name: Download successful Windows build
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.BUILD_RUN_ID }}
          path: downloaded-artifacts

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find downloaded-artifacts -type f \( \
            -name '*.exe' -o \
            -name '*.blockmap' -o \
            -name 'SHA256SUMS.txt' \
          \) -exec cp '{}' release-assets/ \;

          test -n "$(find release-assets -maxdepth 1 -type f -print -quit)"
          cd release-assets
          zip -9 "饺滑-AI划词助手-v0.1.0-beta.1-Windows.zip" ./*

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## 饺滑-AI划词助手 v0.1.0 Beta

          饺滑是一款面向翻译、阅读、搜索和知识整理场景的桌面划词助手。选中文字即可快速调用 AI 技能，并将结果保存、整理和导出。

          ### 核心功能
          - 网页与文档划词调用 AI
          - 自动保存每一次划词与历史对话
          - 支持搜索、回看、整理和删除历史记录
          - 自定义技能名称、图标、系统提示词和划词提示词
          - 自由配置和切换不同 API 服务商
          - 支持导入 Obsidian 和本地文件
          - 支持导出 TXT、Markdown、Word 等格式
          - 结果卡片可一键导入 Obsidian
          - 修复 Microsoft Edge 浏览器插件权限、注入和后台恢复问题

          ### Windows 安装
          1. 下载并运行 `饺滑-AI划词助手 Setup 0.1.0.exe`。
          2. 启动“饺滑-AI划词助手”。
          3. 在 Edge 地址栏打开 `edge://extensions`。
          4. 开启“开发人员模式”，点击“加载解压缩的扩展”。
          5. 选择软件安装目录中的 `resources/browser-extension` 文件夹。
          6. 刷新普通网页，然后划选文字进行测试。

          ### 注意事项
          - 当前版本为 Beta 测试版。
          - 安装包尚未进行代码签名，Windows 可能显示“未知发布者”。
          - `edge://`、浏览器扩展商店等受保护页面无法使用划词插件，这是浏览器限制。
          - API Key 由用户自行配置，请勿公开分享真实密钥。
          EOF

      - name: Create or update draft prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_NAME" \
              --notes-file release-notes.md \
              --draft \
              --prerelease
            gh release upload "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG" release-assets/* \
              --repo "$GITHUB_REPOSITORY" \
              --target "$TARGET_COMMIT" \
              --title "$RELEASE_NAME" \
              --notes-file release-notes.md \
              --draft \
              --prerelease
          fi
