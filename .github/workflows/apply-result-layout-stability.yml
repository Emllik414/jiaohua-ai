  border: 1px solid rgba(148,163,184,.22);
  border-radius: 24px;
  background: rgba(255,255,255,.985);
  box-shadow: 0 10px 28px rgba(15,23,42,.11);
  transition: box-shadow 180ms ease;
}
''',
              'result card fixed viewport shell',
          )
          css = replace_once(
              css,
              '''  overflow-y: auto;
  scroll-behavior: smooth;
  scrollbar-width: none;
''',
              '''  overflow-y: auto;
  scroll-behavior: auto;
  overflow-anchor: none;
  overscroll-behavior: contain;
  scrollbar-width: none;
''',
              'result stream scrolling behavior',
          )
          css_path.write_text(css, encoding='utf-8')
          PY

      - name: Validate JavaScript syntax
        run: node --check electron/main.cjs

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build renderer
        run: npm run build

      - name: Commit validated patch and remove one-shot workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-result-layout-stability.yml
          git add electron/main.cjs src/toolbar/ResultCardChrome.tsx src/toolbar/toolbar.css
          git commit -m "stabilize bidirectional result card growth"
          git push origin master
