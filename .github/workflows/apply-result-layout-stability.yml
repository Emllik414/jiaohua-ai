  box-shadow: 0 10px 28px rgba(15,23,42,.11);
  transition: min-height 260ms cubic-bezier(.2,.8,.2,1), box-shadow 180ms ease;
}
''',
              '''.result-card {
  position: relative;
  width: 360px;
  height: 100vh;
  min-height: 0;
  max-height: none;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
