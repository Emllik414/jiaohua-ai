name: Apply result card layout stability patch

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/apply-result-layout-stability.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply layout and scrolling patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one match, found {count}')
              return text.replace(old, new, 1)

          def regex_once(text, pattern, replacement, label):
              next_text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f'{label}: expected exactly one regex match, found {count}')
              return next_text

          main_path = Path('electron/main.cjs')
          main = main_path.read_text(encoding='utf-8')

          main = replace_once(
              main,
              "let resultPositionMode = 'auto';        // 'auto' | 'manual'\n",
              "let resultPositionMode = 'auto';        // 'auto' | 'manual'\nlet resultLayoutSession = null;\n",
              'main result layout session state',
          )

          main = replace_once(
              main,
              "const RESULT_MIN_HEIGHT = 300;\nconst RESULT_MAX_HEIGHT = 640;\n",
              "const RESULT_MIN_HEIGHT = 300;\nconst RESULT_MAX_HEIGHT = 640;\nconst RESULT_WINDOW_MIN_HEIGHT = 1;\nconst RESULT_RESIZE_BATCH_MS = 32;\n",
              'main result constants',
          )

          main = replace_once(
              main,
              "    minHeight: RESULT_MIN_HEIGHT,\n",
              "    minHeight: RESULT_WINDOW_MIN_HEIGHT,\n",
              'result BrowserWindow minimum height',
          )

          layout_block = r'''function createResultLayoutSession(anchorRect, workArea, desiredHeight) {
  const gap = 8;
  const margin = 8;
  const positioned = floatingLayout.chooseAttachedPosition(anchorRect, {
    width: RESULT_FIXED_WIDTH,
    height: Math.max(1, Number(desiredHeight) || RESULT_DEFAULT_HEIGHT),
  }, workArea, {
    gap,
    margin,
    preferredSide: resultFloatingSide,
  });
  const side = positioned.side;
  const workLeft = workArea.x + margin;
  const workRight = workArea.x + workArea.width - margin;
  const workTop = workArea.y + margin;
  const workBottom = workArea.y + workArea.height - margin;
  const fixedEdge = side === 'above'
    ? anchorRect.y - gap
    : anchorRect.y + anchorRect.height + gap;
  const availableHeight = side === 'above'
    ? fixedEdge - workTop
    : workBottom - fixedEdge;
  const heightLimit = Math.max(1, Math.floor(Math.min(RESULT_MAX_HEIGHT, availableHeight)));
  const height = Math.max(1, Math.min(Math.ceil(Number(desiredHeight) || RESULT_DEFAULT_HEIGHT), heightLimit));
  const x = clamp(Math.round(positioned.x), workLeft, workRight - RESULT_FIXED_WIDTH);
  const y = side === 'above' ? fixedEdge - height : fixedEdge;
  return {
    side,
    anchorRect: { ...anchorRect },
    workArea: { ...workArea },
    gap,
    margin,
    fixedEdge,
    heightLimit,
    x,
    y,
    height,
    userMoved: false,
  };
}

function placeResultNearSelection() {
  if (!resultWindow || resultWindow.isDestroyed()) return;
  const anchorRect = getSelectionAnchorRect();
  pendingResultTargetHeight = null;
  if (resultResizeTimer) {
    clearTimeout(resultResizeTimer);
    resultResizeTimer = null;
  }
  if (!anchorRect) {
    resultLayoutSession = null;
    return placeWindowNearCursor(resultWindow, RESULT_FIXED_WIDTH, currentResultHeight);
  }

  const display = screen.getDisplayNearestPoint({
    x: anchorRect.x + anchorRect.width / 2,
    y: anchorRect.y + anchorRect.height / 2,
  });
  const session = createResultLayoutSession(anchorRect, display.workArea, currentResultHeight);
  resultLayoutSession = session;
  resultFloatingSide = session.side;
  currentFloatingSide = session.side;
  currentResultHeight = session.height;

  console.log('result attached position', {
    side: session.side,
    anchor: anchorRect,
    rect: { x: session.x, y: session.y, width: RESULT_FIXED_WIDTH, height: session.height },
    heightLimit: session.heightLimit,
    fixedEdge: session.fixedEdge,
  });
  resultWindow.setBounds({
    x: session.x,
    y: session.y,
    width: RESULT_FIXED_WIDTH,
    height: session.height,
  }, false);
}

function applyAutomaticResultHeight(targetHeight) {
  const session = resultLayoutSession;
  if (!session || session.userMoved || resultPositionMode !== 'auto') return false;
  const nextHeight = Math.max(1, Math.min(Math.ceil(targetHeight), session.heightLimit));
  const nextY = session.side === 'above'
    ? session.fixedEdge - nextHeight
    : session.fixedEdge;
  const workLeft = session.workArea.x + session.margin;
  const workRight = session.workArea.x + session.workArea.width - session.margin;
  const nextX = clamp(session.x, workLeft, workRight - RESULT_FIXED_WIDTH);
  const current = resultWindow.getBounds();
  if (
    Math.abs(current.x - nextX) < 1 &&
    Math.abs(current.y - nextY) < 1 &&
    Math.abs(current.height - nextHeight) < 1
  ) {
    currentResultHeight = nextHeight;
    return true;
  }

  // Position and size are committed atomically. The edge next to the selection
  // remains fixed, so upward growth does not cross the subtitle and downward
  // growth does not move the card back over the selected text.
  resultWindow.setBounds({
    x: nextX,
    y: nextY,
    width: RESULT_FIXED_WIDTH,
    height: nextHeight,
  }, false);
  currentResultHeight = nextHeight;
  return true;
}

function applyManualResultHeight(targetHeight) {
  const bounds = resultWindow.getBounds();
  const display = screen.getDisplayMatching(bounds);
  const wa = display.workArea;
  const margin = 8;
  const workBottom = wa.y + wa.height - margin;
  const heightLimit = Math.max(1, Math.min(RESULT_MAX_HEIGHT, workBottom - bounds.y));
  const nextHeight = Math.max(1, Math.min(Math.ceil(targetHeight), heightLimit));
  const clamped = clampWindowToWorkArea(bounds.x, bounds.y, RESULT_FIXED_WIDTH, nextHeight, wa, margin);
  resultWindow.setBounds({
    x: clamped.x,
    y: clamped.y,
    width: RESULT_FIXED_WIDTH,
    height: nextHeight,
  }, false);
  currentResultHeight = nextHeight;
}

function pumpResultResize() {
  if (!resultWindow || resultWindow.isDestroyed()) return;
  if (resultResizeTimer) return;
  resultResizeTimer = setTimeout(() => {
    resultResizeTimer = null;
    const targetHeight = pendingResultTargetHeight;
    pendingResultTargetHeight = null;
    if (!targetHeight || !resultWindow || resultWindow.isDestroyed()) return;
    if (!applyAutomaticResultHeight(targetHeight)) {
      applyManualResultHeight(targetHeight);
    }
  }, RESULT_RESIZE_BATCH_MS);
}

function getCurrentResultHeightLimit(bounds) {
  const session = resultLayoutSession;
  if (session && !session.userMoved && resultPositionMode === 'auto') {
    return session.heightLimit;
  }
  const display = screen.getDisplayMatching(bounds);
  const margin = 8;
  const workBottom = display.workArea.y + display.workArea.height - margin;
  return Math.max(1, Math.min(RESULT_MAX_HEIGHT, workBottom - bounds.y));
}

function resizeResultWindowHeight(desiredHeight) {
  if (!resultWindow || resultWindow.isDestroyed()) return { ok: false };
  const bounds = resultWindow.getBounds();
  const desired = Math.max(1, Math.ceil(Number(desiredHeight) || RESULT_DEFAULT_HEIGHT));
  const heightLimit = getCurrentResultHeightLimit(bounds);
  // The screen-side limit wins over the normal design minimum. When only a
  // small strip is available, the BrowserWindow stops there and the renderer
  // continues through its internal scroll viewport.
  const normalMinimum = Math.min(RESULT_MIN_HEIGHT, heightLimit);
  const targetHeight = Math.max(1, Math.min(Math.max(desired, normalMinimum), heightLimit));
  if (Math.abs(bounds.height - targetHeight) < 2) {
    return {
      ok: true,
      width: RESULT_FIXED_WIDTH,
      height: bounds.height,
      targetHeight,
      heightLimit,
      atLimit: targetHeight >= heightLimit,
    };
  }
  pendingResultTargetHeight = targetHeight;
  pumpResultResize();
  return {
    ok: true,
    width: RESULT_FIXED_WIDTH,
    height: bounds.height,
    targetHeight,
    heightLimit,
    atLimit: targetHeight >= heightLimit,
  };
}

function getSelectionSideHeightLimit(anchorRect, workArea, gap = 8, margin = 8, desiredHeight = RESULT_DEFAULT_HEIGHT) {
  const sideLimit = floatingLayout.getSideHeightLimit(anchorRect, workArea, {
    gap,
    margin,
    desiredHeight,
    minHeight: 1,
    preferredSide: resultFloatingSide,
  });
  resultFloatingSide = sideLimit.side;
  return Math.max(1, Math.min(RESULT_MAX_HEIGHT, sideLimit.limit));
}

function placeToolbarMoreNearToolbar() {'''

          main = regex_once(
              main,
              r"function placeResultNearSelection\(\) \{.*?\nfunction placeToolbarMoreNearToolbar\(\) \{",
              layout_block,
              'main result placement and resizing block',
          )

          main = replace_once(
              main,
              "  resultPositionMode = 'manual';\n  resultPointerInside = true;\n",
              "  resultPositionMode = 'manual';\n  if (resultLayoutSession) resultLayoutSession.userMoved = true;\n  resultPointerInside = true;\n",
              'manual result drag session marker',
          )

          main_path.write_text(main, encoding='utf-8')

          result_component = '''import { useEffect, useLayoutEffect, useRef, useState, type ReactNode, type RefObject } from 'react'
import type { MouseEvent as ReactMouseEvent } from 'react'
import { SkillIcon } from '../components/SkillIcon'
import './toolbar.css'

type ResultCardChromeProps = {
  title: string
  subtitle: string
  status: string
  sourceExpanded: boolean
  selectedText: string
  skillIconKey?: string
  cardRef?: RefObject<HTMLDivElement>
  footer: ReactNode
  statusLine?: string
  children: ReactNode
  onToggleSource: () => void
  onClose: () => void
  onHeaderMouseDown: (event: ReactMouseEvent) => void
  onPointerEnter: () => void
  onPointerLeave: () => void
  onPointerDown: () => void
}

type ScrollMode = 'following' | 'reading' | 'returning'
type ResizeSnapshot = {
  screenY: number
  scrollTop: number
  bottomDistance: number
  mode: ScrollMode
  anchorElement: Element | null
  anchorScreenTop: number
}

const RESULT_STREAM_BASE_HEIGHT = 360
const RESULT_STREAM_RESIZE_STEP = 26
const RESULT_RESIZE_BATCH_MS = 120
const FOLLOW_BOTTOM_DISTANCE = 40
const READING_BOTTOM_DISTANCE = 78

export function ResultCardChrome({
  title,
  subtitle,
  status,
  selectedText,
  skillIconKey,
  cardRef,
  footer,
  statusLine,
  children,
  onClose,
  onHeaderMouseDown,
  onPointerEnter,
  onPointerLeave,
  onPointerDown,
}: ResultCardChromeProps) {
  const innerCardRef = useRef<HTMLDivElement>(null)
  const scrollRef = useRef<HTMLDivElement>(null)
  const frameRef = useRef<number | null>(null)
  const resizeTimerRef = useRef<number | null>(null)
  const lastResizeAtRef = useRef(0)
  const lastRequestedHeightRef = useRef(0)
  const headerRef = useRef<HTMLDivElement>(null)
  const sourceRef = useRef<HTMLDivElement>(null)
  const answerRef = useRef<HTMLDivElement>(null)
  const footerRef = useRef<HTMLDivElement>(null)
  const wasStreamingRef = useRef(false)
  const scrollModeRef = useRef<ScrollMode>('following')
  const programmaticScrollRef = useRef(false)
  const resizeSnapshotRef = useRef<ResizeSnapshot | null>(null)
  const effectiveRef = cardRef || innerCardRef
  const [showScrollDown, setShowScrollDown] = useState(false)
  const [popIn, setPopIn] = useState(true)

  const distanceFromBottom = (element: HTMLDivElement) =>
    Math.max(0, element.scrollHeight - element.scrollTop - element.clientHeight)

  const markProgrammaticScroll = (callback: () => void) => {
    programmaticScrollRef.current = true
    callback()
    window.requestAnimationFrame(() => {
      programmaticScrollRef.current = false
    })
  }

  const refreshScrollAffordance = (event?: Event) => {
    const element = scrollRef.current
    if (!element) return
    const distance = distanceFromBottom(element)
    const trustedManualScroll = Boolean(event?.isTrusted) && !programmaticScrollRef.current

    if (scrollModeRef.current === 'returning' && distance <= FOLLOW_BOTTOM_DISTANCE) {
      scrollModeRef.current = 'following'
    } else if (scrollModeRef.current === 'reading' && distance <= FOLLOW_BOTTOM_DISTANCE) {
      scrollModeRef.current = 'following'
    } else if (
      scrollModeRef.current === 'following' &&
      trustedManualScroll &&
      distance > READING_BOTTOM_DISTANCE
    ) {
      scrollModeRef.current = 'reading'
    }

    setShowScrollDown(scrollModeRef.current !== 'following' && distance > FOLLOW_BOTTOM_DISTANCE)
  }

  const findVisibleAnchor = () => {
    const viewport = scrollRef.current
    if (!viewport) return null
    const viewportRect = viewport.getBoundingClientRect()
    const candidates: Element[] = []
    if (sourceRef.current) candidates.push(sourceRef.current)
    if (answerRef.current) {
      const blocks = Array.from(answerRef.current.querySelectorAll(':scope > *'))
      candidates.push(...(blocks.length ? blocks : [answerRef.current]))
    }
    return candidates.find((element) => {
      const rect = element.getBoundingClientRect()
      return rect.bottom > viewportRect.top + 2 && rect.top < viewportRect.bottom - 2
    }) || null
  }

  const captureResizeSnapshot = () => {
    const element = scrollRef.current
    if (!element) return
    const anchorElement = scrollModeRef.current === 'reading' ? findVisibleAnchor() : null
    resizeSnapshotRef.current = {
      screenY: window.screenY,
      scrollTop: element.scrollTop,
      bottomDistance: distanceFromBottom(element),
      mode: scrollModeRef.current,
      anchorElement,
      anchorScreenTop: anchorElement
        ? window.screenY + anchorElement.getBoundingClientRect().top
        : 0,
    }
  }

  useEffect(() => {
    setPopIn(true)
    const timer = window.setTimeout(() => setPopIn(false), 500)
    return () => window.clearTimeout(timer)
  }, [])

  useEffect(() => {
    if (status === 'running' && !wasStreamingRef.current) {
      lastRequestedHeightRef.current = RESULT_STREAM_BASE_HEIGHT
      scrollModeRef.current = 'following'
      setShowScrollDown(false)
    }
    wasStreamingRef.current = status === 'running'
  }, [status])

  useEffect(() => {
    const restoreAfterNativeResize = () => {
      const snapshot = resizeSnapshotRef.current
      const element = scrollRef.current
      if (!snapshot || !element) return
      window.requestAnimationFrame(() => {
        window.requestAnimationFrame(() => {
          const current = resizeSnapshotRef.current
          const scrollElement = scrollRef.current
          if (!current || !scrollElement) return
          markProgrammaticScroll(() => {
            if (current.mode === 'reading') {
              const anchor = current.anchorElement
              if (anchor && anchor.isConnected) {
                const currentScreenTop = window.screenY + anchor.getBoundingClientRect().top
                scrollElement.scrollTop += currentScreenTop - current.anchorScreenTop
              } else {
                scrollElement.scrollTop = Math.max(
                  0,
                  current.scrollTop + (window.screenY - current.screenY),
                )
              }
            } else {
              scrollElement.scrollTop = Math.max(
                0,
                scrollElement.scrollHeight - scrollElement.clientHeight - current.bottomDistance,
              )
            }
          })
          resizeSnapshotRef.current = null
          refreshScrollAffordance()
        })
      })
    }
    window.addEventListener('resize', restoreAfterNativeResize)
    return () => window.removeEventListener('resize', restoreAfterNativeResize)
  }, [])

  const scheduleResize = () => {
    if (popIn || resizeTimerRef.current !== null) return
    const elapsed = performance.now() - lastResizeAtRef.current
    const delay = Math.max(0, RESULT_RESIZE_BATCH_MS - elapsed)
    resizeTimerRef.current = window.setTimeout(() => {
      resizeTimerRef.current = null
      if (frameRef.current !== null) cancelAnimationFrame(frameRef.current)
      frameRef.current = requestAnimationFrame(() => {
        frameRef.current = null
        lastResizeAtRef.current = performance.now()
        const headerHeight = headerRef.current?.offsetHeight ?? 0
        const sourceHeight = sourceRef.current?.offsetHeight ?? 0
        const answerHeight = answerRef.current?.scrollHeight ?? scrollRef.current?.scrollHeight ?? 0
        const footerHeight = footerRef.current?.offsetHeight ?? 0
        const desiredHeight = Math.ceil(headerHeight + sourceHeight + answerHeight + footerHeight + 24)
        if (desiredHeight <= 0) return

        const previousHeight = lastRequestedHeightRef.current
        const streaming = status === 'running'
        const growsByLine = desiredHeight >= Math.max(
          RESULT_STREAM_BASE_HEIGHT,
          previousHeight + RESULT_STREAM_RESIZE_STEP,
        )
        const finalSizeChanged = !streaming && (
          previousHeight === 0 ||
          Math.abs(desiredHeight - previousHeight) >= RESULT_STREAM_RESIZE_STEP
        )
        if (!growsByLine && !finalSizeChanged) return

        lastRequestedHeightRef.current = desiredHeight
        captureResizeSnapshot()
        try {
          void (window.desktopApi as any).resizeResultBox?.({ height: desiredHeight })
        } catch (_) {}
      })
    }, delay)
  }

  useEffect(() => {
    if (popIn) return
    scheduleResize()
    const observer = new ResizeObserver(() => scheduleResize())
    const observed = [headerRef.current, sourceRef.current, answerRef.current, footerRef.current]
      .filter((element): element is Element => Boolean(element))
    observed.forEach((element) => observer.observe(element))
    return () => {
      observer.disconnect()
      if (resizeTimerRef.current !== null) window.clearTimeout(resizeTimerRef.current)
      if (frameRef.current !== null) cancelAnimationFrame(frameRef.current)
    }
  }, [popIn])

  useEffect(() => {
    scheduleResize()
  }, [children, status])

  useEffect(() => {
    const element = scrollRef.current
    if (!element) return
    const onScroll = (event: Event) => refreshScrollAffordance(event)
    const onWheel = (event: WheelEvent) => {
      if (event.deltaY < 0) {
        scrollModeRef.current = 'reading'
        setShowScrollDown(true)
      }
    }
    element.addEventListener('scroll', onScroll)
    element.addEventListener('wheel', onWheel, { passive: true })
    refreshScrollAffordance()
    return () => {
      element.removeEventListener('scroll', onScroll)
      element.removeEventListener('wheel', onWheel)
    }
  }, [])

  const scrollToBottom = () => {
    const element = scrollRef.current
    if (!element) return
    scrollModeRef.current = 'returning'
    setShowScrollDown(false)
    element.scrollTo({ top: element.scrollHeight, behavior: 'smooth' })
  }

  useLayoutEffect(() => {
    const element = scrollRef.current
    if (!element || scrollModeRef.current !== 'following') return
    markProgrammaticScroll(() => {
      element.scrollTop = element.scrollHeight
    })
    refreshScrollAffordance()
  }, [children])

  return (
    <div
      ref={effectiveRef}
      className={'result-card' + (popIn ? ' pop-in' : '') + (status === 'running' ? ' is-streaming' : '')}
      onMouseEnter={onPointerEnter}
      onMouseLeave={onPointerLeave}
      onMouseDown={onPointerDown}
      onPointerDown={onPointerDown}
    >
      <header
        ref={headerRef}
        className='result-card-header'
        onMouseDown={onHeaderMouseDown}
        style={{ WebkitAppRegion: 'drag' } as any}
      >
        <div className='top-drag-grip' />
        <span className='skill-avatar'><SkillIcon iconKey={skillIconKey || 'spark'} /></span>
        <div className='title-block'>
          <div className='title-row'>
            <span className='title'>{title}</span>
            <span className='ai-pill'>AI</span>
          </div>
          <div className='model-line'>{status === 'running' ? '正在生成中...' : subtitle}</div>
        </div>
        <button
          className='close-btn'
          onClick={onClose}
          title='关闭'
          style={{ WebkitAppRegion: 'no-drag' } as any}
        >
          <SkillIcon iconKey='close' />
        </button>
      </header>

      <div className='result-card-scroll-shell'>
        <div className='result-card-scroll' ref={scrollRef}>
          <section ref={sourceRef} className='source-quote'>
            <div className='source-head'>
              <span>原文</span>
              <button
                className='copy-inline'
                aria-label='复制原文'
                title='复制原文'
                onClick={() => {
                  try { void (window.desktopApi as any).copyText?.(selectedText, { silent: true }) } catch (_) {}
                }}
              >
                <SkillIcon iconKey='copy' />
              </button>
            </div>
            <p className='source-text'>{selectedText}</p>
          </section>
          <section ref={answerRef} className='answer'>{children}</section>
          {statusLine ? <div className='status-line'>{statusLine}</div> : null}
        </div>

        <button
          className={'scroll-down-hint' + (showScrollDown ? ' show' : '')}
          onClick={scrollToBottom}
          title='滚动到底部'
          aria-hidden={!showScrollDown}
          tabIndex={showScrollDown ? 0 : -1}
        >
          <svg viewBox='0 0 24 24' fill='none' stroke='currentColor' strokeWidth='2' strokeLinecap='round'>
            <path d='M12 5v14' /><path d='m19 12-7 7-7-7' />
          </svg>
        </button>
      </div>

      <footer ref={footerRef} className='result-card-footer'>{footer}</footer>
    </div>
  )
}
'''
          Path('src/toolbar/ResultCardChrome.tsx').write_text(result_component, encoding='utf-8')

          css_path = Path('src/toolbar/toolbar.css')
          css = css_path.read_text(encoding='utf-8-sig')
          css = replace_once(
              css,
              '''.result-card {
  position: relative;
  width: 360px;
  min-height: 300px;
  max-height: 600px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
